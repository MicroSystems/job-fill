<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>Upload Resume</title>
  <style>
    :root {
      --bg: #faf8f5;
      --bg-card: #ffffff;
      --text: #1c1917;
      --text-secondary: #78716c;
      --border: #e7e5e4;
      --accent: #d97706;
    }
    [data-theme="dark"] {
      --bg: #1c1917;
      --bg-card: #292524;
      --text: #faf8f5;
      --text-secondary: #a8a29e;
      --border: #44403c;
      --accent: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      color: var(--text);
      background: var(--bg);
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .status { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
    input[type="file"] { margin-bottom: 12px; }
    .btn {
      display: inline-block;
      padding: 8px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .success { color: var(--accent); font-weight: 600; }
  </style>
  <script>
    const theme = localStorage.getItem("jf-theme");
    if (theme) document.documentElement.setAttribute("data-theme", theme);
  </script>
</head>
<body>
  <h1>Upload Resume</h1>
  <div id="status" class="status">Select a PDF file to upload as your resume.</div>
  <input type="file" id="fileInput" accept=".pdf" />
  <div id="done" style="display:none">
    <p class="success">Resume uploaded! You can close this window.</p>
  </div>
  <script src="upload.js"></script>
</body>
</html>
